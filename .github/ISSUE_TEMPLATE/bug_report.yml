name: Bug Report
description: Report a bug in LiteEdit
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open a file with ...
        2. Press ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 14.4"
    validations:
      required: true
  - type: input
    id: liteedit-version
    attributes:
      label: LiteEdit version
      placeholder: "e.g. v1.0.0 or built from main"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console output (if any)
      description: Run `open LiteEdit.app` from Terminal and paste any relevant log output.
      render: shell
